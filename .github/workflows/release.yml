name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary_name: md2tex
            extension: tar.gz
            arch: linux-amd64
            is_main: true
          - os: macos-latest
            binary_name: md2tex
            extension: tar.gz
            arch: darwin-arm64
            is_main: false
          - os: windows-latest
            binary_name: md2tex.exe
            extension: zip
            arch: windows-amd64
            is_main: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Create archive
        shell: bash
        run: |
          cd target/release
          # 查找实际的二进制文件名（可能是 md2tex 或 md2tex-converter）
          BINARY=$(ls -1 md2tex* 2>/dev/null | grep -v '\.d$' | head -1)
          if [ -z "$BINARY" ]; then
            echo "No md2tex binary found!"
            exit 1
          fi
          echo "Found binary: $BINARY"
          # 只有当二进制文件名与目标不同时才重命名
          if [ "$BINARY" != "md2tex" ] && [ "$BINARY" != "md2tex.exe" ]; then
            mv "$BINARY" md2tex
          fi
          if [ "${{ matrix.extension }}" = "zip" ]; then
            powershell -Command "Compress-Archive -Path md2tex -DestinationPath md2tex-${{ matrix.arch }}.zip"
          else
            tar -czvf md2tex-${{ matrix.arch }}.tar.gz md2tex
          fi

      # 仅在主构建（ubuntu）时提取标签消息
      - name: Fetch tag message
        if: matrix.is_main == true
        run: |
          git fetch --tags --force
          git tag -l --format='%(contents)' ${{ github.ref_name }} > release_notes.txt
          cat release_notes.txt

      # 仅在主构建（ubuntu）时创建 Release 并添加说明
      - name: Create Release with notes
        if: matrix.is_main == true
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.txt
          generate_release_notes: true
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 所有平台都上传各自的附件
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: target/release/md2tex-${{ matrix.arch }}.${{ matrix.extension }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
