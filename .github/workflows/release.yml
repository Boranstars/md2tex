name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary_name: md2tex
            extension: tar.gz
            arch: linux-amd64
          - os: macos-latest
            binary_name: md2tex
            extension: tar.gz
            arch: darwin-arm64
          - os: windows-latest
            binary_name: md2tex.exe
            extension: zip
            arch: windows-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Create archive
        shell: bash
        run: |
          cd target/release
          # 查找实际的二进制文件名（可能是 md2tex 或 md2tex-converter）
          BINARY=$(ls -1 md2tex* 2>/dev/null | grep -v '\.d$' | head -1)
          if [ -z "$BINARY" ]; then
            echo "No md2tex binary found!"
            exit 1
          fi
          echo "Found binary: $BINARY"
          # 重命名为标准名称 md2tex
          mv "$BINARY" md2tex
          if [ "${{ matrix.extension }}" = "zip" ]; then
            powershell -Command "Compress-Archive -Path md2tex -DestinationPath md2tex-${{ matrix.arch }}.zip"
          else
            tar -czvf md2tex-${{ matrix.arch }}.tar.gz md2tex
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: target/release/md2tex-${{ matrix.arch }}.${{ matrix.extension }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
