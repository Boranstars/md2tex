name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary_name: md2tex
            extension: tar.gz
            arch: linux-amd64
          - os: macos-latest
            binary_name: md2tex
            extension: tar.gz
            arch: darwin-arm64
          - os: windows-latest
            binary_name: md2tex.exe
            extension: zip
            arch: windows-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Create archive
        shell: bash
        run: |
          cd target/release
          if [ "${{ matrix.extension }}" = "zip" ]; then
            powershell -Command "Compress-Archive -Path ${{ matrix.binary_name }} -DestinationPath md2tex-${{ matrix.arch }}.zip"
          else
            tar -czvf md2tex-${{ matrix.arch }}.tar.gz ${{ matrix.binary_name }}
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: target/release/md2tex-*.tar.gz,target/release/md2tex-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
